<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Document Scanner</title>
    <link rel="stylesheet" href="style.css">
    <!-- Third-party OCR & PDF layout engines -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body>

    <!-- Main Application Slab Wrapper -->
    <div class="main-container" id="mainContainer">
        <div class="glass-slab main-slab">
            <!-- Settings Circular Disc Button -->
            <button class="disc-btn settings-disc" id="openSettingsBtn" aria-label="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>

            <h2>Document Scanner</h2>
            <p class="subtitle">Extract layout-preserved text seamlessly.</p>
            
            <div class="drop-zone" id="dropZone">
                <span class="drop-zone-text">Drag & drop or click to upload</span>
                <input type="file" id="fileInput" accept="image/*,application/pdf" hidden>
                <button class="btn pill-btn" id="uploadBtn">Choose File</button>
            </div>

            <div class="file-info" id="fileInfo">No file selected</div>

            <div class="action-container">
                <button class="btn pill-btn primary-btn" id="scanBtn" disabled>Scan Text</button>
                <button class="btn pill-btn success-btn" id="downloadBtn" disabled>Download .txt</button>
            </div>

            <div class="status-container">
                <div class="progress-bar-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div id="statusText">Ready</div>
            </div>
        </div>
    </div>

    <!-- Secondary Settings Slab Overlaid -->
    <div class="settings-overlay-container id-hidden" id="settingsContainer">
        <div class="glass-slab secondary-slab">
            <!-- Red Close Circular Disc Button -->
            <button class="disc-btn close-disc" id="closeSettingsBtn" aria-label="Close Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

            <h2>Settings</h2>
            <p class="subtitle">Personalize your workspace utilities</p>

            <div class="settings-list">
                <!-- iOS Dark Mode Setting Row -->
                <div class="settings-row">
                    <span class="settings-label">Dark Mode</span>
                    <label class="ios-switch">
                        <input type="checkbox" id="darkModeToggle">
                        <span class="switch-slider"></span>
                    </label>
                </div>

                <hr class="settings-divider">

                <!-- Author Details Section -->
                <div class="author-section">
                    <h3>About the Author</h3>
                    <div class="author-card">
                        <span class="author-meta">GitHub Account</span>
                        <a href="https://github.com/harsh-dev-live" target="_blank" class="author-handle" rel="noopener">@harsh-dev-live</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Background PDF handling rendering target -->
    <canvas id="pdfCanvas" style="display:none;"></canvas>

    <script src="script.js"></script>
</body>
</html>
